name: Backup Firebase DB (Encrypted)

on:
  schedule:
    # Runs every Sunday at 3:00 AM UTC
    - cron: '0 3 * * 0'
  workflow_dispatch: # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download and encrypt database backup
        env:
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
          FIREBASE_AUTH_TOKEN: ${{ secrets.FIREBASE_AUTH_TOKEN }}
          BACKUP_PASSWORD: ${{ secrets.BACKUP_PASSWORD }}
        run: |
          mkdir -p backups
          # Download database with auth token
          curl -sf "${FIREBASE_DB_URL}/households.json?auth=${FIREBASE_AUTH_TOKEN}" -o /tmp/backup_raw.json
          # Verify it's valid JSON
          python3 -m json.tool /tmp/backup_raw.json > /dev/null
          # Encrypt with AES-256-CBC using PBKDF2 key derivation
          openssl enc -aes-256-cbc -salt -pbkdf2 -iter 100000 \
            -in /tmp/backup_raw.json \
            -out "backups/backup_$(date +%Y%m%d_%H%M%S).json.enc" \
            -pass pass:"${BACKUP_PASSWORD}"
          # Clean up plaintext
          rm -f /tmp/backup_raw.json

      - name: Remove old backups (keep last 10)
        run: |
          cd backups
          ls -t *.enc 2>/dev/null | tail -n +11 | xargs -r rm

      - name: Commit and push backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          git diff --cached --quiet || git commit -m "Encrypted DB backup $(date +%Y-%m-%d)"
          git push
