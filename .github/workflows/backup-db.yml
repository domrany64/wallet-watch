name: Backup Firebase DB (Encrypted)

on:
  schedule:
    # Runs every Sunday at 3:00 AM UTC
    - cron: '0 3 * * 0'
  workflow_dispatch: # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip install google-auth requests --quiet

      - name: Download and encrypt database backup
        env:
          FIREBASE_SA_KEY: ${{ secrets.FIREBASE_SA_KEY }}
          BACKUP_PASSWORD: ${{ secrets.BACKUP_PASSWORD }}
        run: |
          mkdir -p backups

          # Get OAuth2 access token from service account key
          python3 -c "
import json, os
from google.oauth2 import service_account
import google.auth.transport.requests
sa_key = json.loads(os.environ['FIREBASE_SA_KEY'])
creds = service_account.Credentials.from_service_account_info(sa_key, scopes=['https://www.googleapis.com/auth/firebase.database','https://www.googleapis.com/auth/userinfo.email'])
creds.refresh(google.auth.transport.requests.Request())
print(creds.token)
" > /tmp/access_token.txt

          ACCESS_TOKEN=$(cat /tmp/access_token.txt)

          # Download database using access token
          HTTP_STATUS=$(curl -s -w "%{http_code}" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            "https://wallet-watch-247f2-default-rtdb.firebaseio.com/households.json" \
            -o /tmp/backup_raw.json)

          if [ "$HTTP_STATUS" != "200" ] || [ ! -s /tmp/backup_raw.json ]; then
            echo "ERROR: Download failed. HTTP status: ${HTTP_STATUS}"
            cat /tmp/backup_raw.json || true
            exit 1
          fi

          # Verify valid JSON
          python3 -m json.tool /tmp/backup_raw.json > /dev/null

          # Encrypt with AES-256-CBC using PBKDF2 key derivation
          openssl enc -aes-256-cbc -salt -pbkdf2 -iter 100000 \
            -in /tmp/backup_raw.json \
            -out "backups/backup_$(date +%Y%m%d_%H%M%S).json.enc" \
            -pass pass:"${BACKUP_PASSWORD}"

          # Clean up plaintext
          rm -f /tmp/backup_raw.json /tmp/access_token.txt

      - name: Remove old backups (keep last 10)
        run: |
          cd backups
          ls -t *.enc 2>/dev/null | tail -n +11 | xargs -r rm

      - name: Commit and push backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          git diff --cached --quiet || git commit -m "Encrypted DB backup $(date +%Y-%m-%d)"
          git push
