<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WalletWatch — Family Budget Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="#/" class="logo">💰 WalletWatch</a>
            <div class="header-actions">
                <button class="btn btn-sm btn-surface" id="backupBtn" style="display:none" title="Backup / Restore">🔒</button>
                <button class="btn btn-sm btn-surface" id="settingsBtn" style="display:none" title="Settings">⚙️</button>
                <button class="btn btn-secondary btn-sm" id="authBtn">Login</button>
            </div>
        </div>
        <nav class="nav-tabs" id="navTabs" style="display:none">
            <a href="#/dashboard" class="nav-tab active" data-view="dashboard">📊 Dashboard</a>
            <a href="#/transactions" class="nav-tab" data-view="transactions">📝 Transactions</a>
            <a href="#/recurring" class="nav-tab" data-view="recurring">🔄 Recurring</a>
            <a href="#/cards" class="nav-tab" data-view="cards">💳 Accounts</a>
            <a href="#/savings" class="nav-tab" data-view="savings">🎯 Savings</a>
        </nav>
    </header>

    <main class="main" id="mainContent">
        <!-- Dynamic content rendered here -->
    </main>

    <!-- Login Modal -->
    <div class="modal-overlay" id="loginOverlay">
        <div class="modal modal-sm">
            <div class="modal-header">
                <h2>Login</h2>
                <button class="modal-close" id="loginClose">&times;</button>
            </div>
            <form id="loginForm" class="modal-form">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" required placeholder="Password">
                </div>
                <div class="form-error" id="loginError"></div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Login</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Generic Modal (for add/edit forms) -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="genericModal">
            <div class="modal-header">
                <h2 id="modalTitle">Title</h2>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Dynamic form content -->
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsOverlay">
        <div class="modal modal-sm">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="modal-close" id="settingsClose">&times;</button>
            </div>
            <form id="settingsForm" class="modal-form">
                <div class="form-group">
                    <label for="settingsIncome">Monthly Income ($)</label>
                    <input type="number" id="settingsIncome" required min="0" step="0.01" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label for="settingsCurrency">Currency Symbol</label>
                    <input type="text" id="settingsCurrency" required placeholder="$" maxlength="5" value="$">
                </div>
                <div class="form-group">
                    <label for="settingsSpenders">Spenders (comma-separated)</label>
                    <input type="text" id="settingsSpenders" required placeholder="Damon, Sedi">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Settings</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Backup/Restore Modal -->
    <div class="modal-overlay" id="backupOverlay">
        <div class="modal modal-sm">
            <div class="modal-header">
                <h2>Backup & Restore</h2>
                <button class="modal-close" id="backupClose">&times;</button>
            </div>
            <div class="modal-form">
                <div class="form-group">
                    <label for="backupPassword">Encryption Password</label>
                    <input type="password" id="backupPassword" placeholder="Enter a strong password">
                    <small class="form-hint">Used to encrypt/decrypt your backup file</small>
                </div>
                <div class="backup-actions">
                    <button class="btn btn-primary" id="doBackupBtn">⬇️ Download Encrypted Backup</button>
                    <div class="backup-divider">or</div>
                    <label class="btn btn-secondary upload-btn">
                        ⬆️ Restore from Backup
                        <input type="file" id="restoreFile" accept=".enc,.json" style="display:none">
                    </label>
                </div>
                <div class="form-error" id="backupError"></div>
                <div class="form-success" id="backupSuccess"></div>
            </div>
        </div>
    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast"></div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
